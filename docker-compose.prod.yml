services:
  app:
    image: ${IMAGE}
    container_name: pickdo-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-pickdo}
      DB_USERNAME: ${DB_USERNAME:-pickdo}
      DB_PASSWORD: ${DB_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: pickdo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pickdo}
      POSTGRES_USER: ${DB_USERNAME:-pickdo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pickdo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pickdo} -d ${DB_NAME:-pickdo}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pickdo-postgres-data:
