services:
  postgres:
    image: postgres:16-alpine
    container_name: pickdo-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-pickdo}
      POSTGRES_USER: ${DB_USERNAME:-pickdo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pickdo}
    volumes:
      - pickdo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pickdo} -d ${DB_NAME:-pickdo}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pickdo-postgres-data:
